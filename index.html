<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expense Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Expense Tracker</h1>

<div class="summary">

<div class="card income">

<h3>Total Income</h3>

<h2 id="income">₹0</h2>

</div>

<div class="card expense">

<h3>Total Expense</h3>

<h2 id="expense">₹0</h2>

</div>

<div class="card balance">

<h3>Balance</h3>

<h2 id="balance">₹0</h2>

</div>

</div>

<div class="form">

<input
type="text"
id="title"
placeholder="Transaction Title"
>

<input
type="number"
id="amount"
placeholder="Amount"
>

<select id="type">

<option value="Income">Income</option>

<option value="Expense">Expense</option>

</select>

<button onclick="addTransaction()">

Add Transaction

</button>

</div>

<div class="filter">

<input
type="text"
id="search"
placeholder="Search..."
onkeyup="searchTransaction()"
>

<select
id="filter"
onchange="filterTransaction()"
>

<option value="All">All</option>

<option value="Income">Income</option>

<option value="Expense">Expense</option>

</select>

</div>

<table>

<thead>

<tr>

<th>Title</th>

<th>Amount</th>

<th>Type</th>

<th>Delete</th>

</tr>

</thead>

<tbody id="list">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
